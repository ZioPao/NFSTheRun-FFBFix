[FFB]

; Master gain scale applied on top of everything else.
; 0.30 = 30% of the original overall strength.
GainScale=1

; Spring / Damper / Inertia / Friction — this is what controls the
; insane centering force. Lower this first.
SpringScale=0.5

; Constant force — road feel, collisions, banking.
ConstantScale=0.40

; Periodic effects — rumble strips, engine vibration, kerbs.
PeriodicScale=0.40
